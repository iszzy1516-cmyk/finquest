version: "3.8"

services:
  # Production: single backend container serving both API and frontend
  finquest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finquest
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:-your-default-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/finquest.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - SAME_SITE=${SAME_SITE:-Lax}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Development: hot-reload backend
  backend-dev:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: finquest-backend-dev
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-not-for-production
      - DATABASE_URL=sqlite:///./data/finquest.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - SECURE_COOKIES=false
      - SAME_SITE=Lax
    volumes:
      - ./app/backend/app:/app/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    profiles:
      - dev

  # Development: hot-reload frontend
  frontend-dev:
    image: node:20-alpine
    container_name: finquest-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://localhost:8001/api/v1
    restart: unless-stopped
    profiles:
      - dev
